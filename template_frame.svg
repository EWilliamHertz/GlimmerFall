            </filter>
            <clipPath id="artClip">
                <rect x="6" y="12" width="57" height="42" rx="2" />
            </clipPath>
        </defs>

        <!-- BLEED AREA (Dark border) -->
        <rect width="69" height="94" fill="#000000" />

        <!-- TRIM LINE GUIDELINE (Hidden in production, keeping for debugging) -->
        <rect x="3" y="3" width="63" height="88" rx="3.5" fill="none" stroke="#333333" stroke-width="0.2" stroke-dasharray="1 1" />

        <!-- SAFE ZONE BACKGROUND (Gradient base) -->
        <rect x="6" y="6" width="57" height="82" rx="2" fill="url(#bgGradient)" stroke="url(#frameGradient)" stroke-width="0.5" />

        <!-- MAIN ART CANVAS (Placeholder) -->
        <rect x="6" y="12" width="57" height="42" fill="#334155" clip-path="url(#artClip)" />
        <!-- Subtle inner shadow/border for art -->
        <rect x="6" y="12" width="57" height="42" fill="none" stroke="#000000" stroke-width="0.5" clip-path="url(#artClip)" />
        <text x="34.5" y="32" font-family="'Trebuchet MS', Arial, sans-serif" font-size="2.5" fill="#94a3b8" text-anchor="middle" letter-spacing="1">[ AI Artwork Placeholder ]</text>

        <!-- HEADER BAR -->
        <path d="M 6 6 h 45 l 3 6 h -48 Z" fill="rgba(0,0,0,0.8)" stroke="rgba(255,255,255,0.1)" stroke-width="0.3" filter="url(#dropShadow)" />
        <text x="8" y="10" font-family="'Trebuchet MS', Arial, sans-serif" font-size="3" font-weight="900" fill="#ffffff" letter-spacing="0.2">SUNFIRE COLOSSUS</text>

        <!-- COST CIRCLE -->
        <circle cx="59" cy="9" r="4" fill="url(#costGradient)" stroke="#22d3ee" stroke-width="0.4" filter="url(#dropShadow)" />
        <text x="59" y="10.2" font-family="'Arial Black', Arial, sans-serif" font-size="4" font-weight="900" fill="#ffffff" text-anchor="middle">6</text>

        <!-- TYPE LINE / MIDDLE BAR -->
        <rect x="6" y="54" width="57" height="5" fill="rgba(15,23,42,0.9)" stroke="rgba(148,163,184,0.3)" stroke-width="0.3" filter="url(#dropShadow)" />
        <text x="8" y="57.5" font-family="'Trebuchet MS', Arial, sans-serif" font-size="2.2" font-weight="bold" fill="#67e8f9" letter-spacing="1" text-transform="uppercase">Solari • Entity</text>
        <text x="61" y="57.5" font-family="Arial" font-size="2.5" fill="#facc15" text-anchor="end">★</text>

        <!-- TEXT BOX (Rules) -->
        <rect x="6" y="59" width="57" height="24" fill="rgba(2,6,23,0.7)" />
        
        <!-- Keywords -->
        <text x="8" y="63" font-family="'Trebuchet MS', Arial, sans-serif" font-size="2.2" font-weight="bold" fill="#ffffff">Overwhelm</text>
        
        <!-- Ability Text -->
        <text x="8" y="67" font-family="'Georgia', serif" font-size="2.2" font-style="italic" fill="#cbd5e1" line-height="1.5">
            <tspan x="8" dy="0">Excess combat damage bleeds to the enemy</tspan><tspan x="8" dy="3">Nexus.</tspan>
        </text>

        <!-- COMBAT STATS (Bottom Right) -->
        <path d="M 49 88 l 2 -6 h 12 v 6 Z" fill="#0f172a" stroke="#475569" stroke-width="0.4" filter="url(#dropShadow)"/>
        <text x="57" y="86.5" font-family="'Arial Black', Arial, sans-serif" font-size="3.5" font-weight="900" fill="#ffffff" text-anchor="middle">6 / 6</text>

        <!-- FOOTER / META INFO (Bottom Left) -->
        <text x="8" y="86" font-family="'Trebuchet MS', Arial, sans-serif" font-size="1.5" fill="#64748b" font-weight="bold">GLIMMERFALL - 089 | © 2026 AI Generated</text>
    </svg>