<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700;900&display=swap');
  
  body, html {
    margin: 0;
    padding: 0;
    width: 72mm;
    height: 125mm;
    background: #000;
    overflow: hidden;
  }
  
  .pack-container {
    width: 72mm;
    height: 125mm;
    position: relative;
    background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
    overflow: hidden;
    color: white;
    font-family: 'Inter', sans-serif;
    border: 1mm solid #334155; /* Bleed guide line, won't print if full bleed */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
  }
  
  .pack-container::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(circle at 50% 30%, rgba(6, 182, 212, 0.4) 0%, transparent 40%),
      radial-gradient(circle at 20% 80%, rgba(168, 85, 247, 0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(234, 179, 8, 0.2) 0%, transparent 40%);
    z-index: 1;
    pointer-events: none;
  }
  
  .stars {
    position: absolute;
    inset: 0;
    background-image: 
      radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px),
      radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
    background-size: 50px 50px, 100px 100px;
    background-position: 0 0, 20px 20px;
    opacity: 0.3;
    z-index: 2;
  }

  .content-z {
    position: relative;
    z-index: 10;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 26px;
    text-align: center;
    background: linear-gradient(to bottom, #ffffff, #67e8f9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 10px rgba(6, 182, 212, 0.8));
    margin-top: 15mm;
    letter-spacing: 2px;
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: #cbd5e1;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
  }

  .series {
    font-size: 14px;
    font-weight: 900;
    color: #fcd34d;
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 4mm;
    text-shadow: 0 0 8px rgba(252, 211, 77, 0.6);
  }

  .center-art {
    margin-top: auto;
    margin-bottom: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .diamond-icon {
    width: 40px;
    height: 40px;
    filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.8));
  }

  .card-count {
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: white;
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.5);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
  }

  .rarities-box {
    display: flex;
    gap: 10px;
    margin-top: 10px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  .rarity-sm { width: 14px; height: 14px; }

  .footer-warning {
    font-size: 6px;
    text-align: center;
    color: #94a3b8;
    margin-bottom: 8mm;
    padding: 0 6mm;
    line-height: 1.4;
  }
  
  .crimp-top, .crimp-bottom {
    position: absolute;
    width: 100%;
    height: 8mm;
    background: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 3px);
    z-index: 20;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
  }
  .crimp-top { top: 0; }
  .crimp-bottom { bottom: 0; }

</style>
</head>
<body>
  <div class="pack-container">
    <div class="crimp-top"></div>
    <div class="stars"></div>
    
    <div class="content-z">
      <div class="logo">GLIMMERFALL<br>TCG</div>
      <div class="subtitle">First Edition</div>
      <div class="series">The Awakening</div>
    </div>

    <div class="content-z center-art">
      <svg class="diamond-icon" viewBox="0 0 24 24">
        <defs>
          <linearGradient id="main-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stopColor="#ffffff" />
            <stop offset="50%" stopColor="#a855f7" />
            <stop offset="100%" stopColor="#000000" />
          </linearGradient>
        </defs>
        <path d="M12 1L23 12L12 23L1 12Z" fill="url(#main-grad)" stroke="rgba(255,255,255,0.9)" stroke-width="1.5"/>
        <path d="M12 1L12 23M1 12L23 12" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
        <circle cx="12" cy="12" r="3" fill="#ffffff" opacity="0.6" />
      </svg>
      
      <div class="card-count">10 Trading Cards</div>
      
      <div class="rarities-box">
        <!-- Uncommon -->
        <svg class="rarity-sm" viewBox="0 0 24 24" style="filter: drop-shadow(0 0 4px #38bdf8)"><path d="M12 1L23 12L12 23L1 12Z" fill="#38bdf8" stroke="#fff" stroke-width="1"/></svg>
        <!-- Rare -->
        <svg class="rarity-sm" viewBox="0 0 24 24" style="filter: drop-shadow(0 0 4px #a855f7)"><path d="M12 1L23 12L12 23L1 12Z" fill="#a855f7" stroke="#fff" stroke-width="1"/></svg>
        <!-- Mythic -->
        <svg class="rarity-sm" viewBox="0 0 24 24" style="filter: drop-shadow(0 0 4px #eab308)"><path d="M12 1L23 12L12 23L1 12Z" fill="#eab308" stroke="#fff" stroke-width="1"/></svg>
        <!-- Foil -->
        <svg class="rarity-sm" viewBox="0 0 24 24" style="filter: drop-shadow(0 0 4px #ec4899)"><path d="M12 1L23 12L12 23L1 12Z" fill="#ec4899" stroke="#fff" stroke-width="1"/></svg>
      </div>
    </div>

    <div class="content-z footer-warning">
      CONTAINS 10 RANDOMLY ASSORTED TRADING CARDS<br>
      Look for Rare, Mythic, and Founders Foil cards!<br>
      Drops are completely random and not guaranteed.
    </div>
    
    <div class="crimp-bottom"></div>
  </div>
</body>
</html>
